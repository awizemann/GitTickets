name: Relay (Cloudflare) — lint & test

on:
  push:
    branches: [main]
    paths:
      - "relay/cloudflare/**"
      - "relay/shared/**"
      - ".github/workflows/relay-cloudflare.yml"
  pull_request:
    paths:
      - "relay/cloudflare/**"
      - "relay/shared/**"
      - ".github/workflows/relay-cloudflare.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay/cloudflare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: relay/cloudflare/package.json
      - run: npm install
      - run: npm run lint
      - run: npm test
